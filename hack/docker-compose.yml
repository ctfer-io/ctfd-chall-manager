services:
  ctfd:
    image: ctfd/ctfd:3.8.6@sha256:5b780b3628f2fe7bc0cdf9567d51244c2e8b5bb93f227fdac0532c94ae43f7c7
    container_name: ctfd
    ports:
      - 8000:8000
    networks:
      - testing
    volumes:
      - ../:/opt/CTFd/CTFd/plugins/ctfd_chall_manager
    environment:
      LOG_LEVEL: DEBUG
      PLUGIN_SETTINGS_CM_API_URL: http://chall-manager:8080
      PLUGIN_SETTINGS_CM_MANA_TOTAL: 10
    depends_on:
      - chall-manager
    healthcheck:
      test: python3 -c 'import requests; requests.get("http://localhost:8000")'
      interval: 10s
      retries: 3
      timeout: 10s

  chall-manager:
    image: ctferio/chall-manager:v0.6.6@sha256:34b5ca4b9e02db171cd58f148f927c0955c106427e97e4525e0376c2512c3959
    container_name: chall-manager
    pull_policy: always
    ports:
      - 8080:8080
    environment:
      LOG_LEVEL: DEBUG
      SWAGGER: true
      KUBECONFIG: /tmp/config
      OCI_INSECURE: true
    volumes:
      - ~/.kube/config:/tmp/config:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - testing

  chall-manager-janitor:
    image: ctferio/chall-manager-janitor:v0.6.6@sha256:69ee55e6ad10f25b6c454c70b4de49350c82e5dde9c681a3e1c3ac623a6e0970
    container_name: chall-manager-janitor
    pull_policy: always
    environment:
      URL: chall-manager:8080
      TICKER: 30s
    networks:
      - testing

  ctfd-setup:
    image: ctferio/ctfd-setup:v1.7.1@sha256:d555410c10f66eb88a6579078d3f2c9131279e3057c21831a69feb447479b877
    environment:
      URL: http://ctfd:8000
      FILE: /.ctfd.yaml
    volumes:
      - .ctfd.yaml:/.ctfd.yaml
    networks:
      - testing
    depends_on:
      ctfd:
        condition: service_healthy

  registry:
    image: registry:3
    container_name: registry
    ports:
      - 5000:5000
    networks:
      - testing

networks:
  testing:
    driver: bridge
